name: Flaky Report

on:
  pull_request:
  workflow_dispatch:

jobs:
  flaky-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with JUnit output
        run: |
          mkdir -p test-results
          cp test/fixtures/junit-multi.xml test-results/junit.xml

      - name: Publish flaky report
        if: always()
        uses: ./
        with:
          server-url: http://your-flaky-graveyard.example.com
          junit-glob: test-results/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
